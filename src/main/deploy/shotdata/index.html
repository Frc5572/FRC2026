<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shot Data</title>
</head>

<body>
    <script src="/scripts/d3.v7.min.js"></script>
    <script type="module">
        let data = [[0, 0, 2], [1, 1, 2], [2, 0, 1]]

        function band_graph(data) {
            let element = document.getElementById("test");
            if (element) {
                element.remove();
            }

            const width = 640;
            const height = 400;
            const marginTop = 20;
            const marginRight = 20;
            const marginBottom = 35;
            const marginLeft = 40;

            const x = d3.scaleLinear()
                .domain([0, 30]).nice(1)
                .range([marginLeft, width - marginRight]);

            const y = d3.scaleLinear()
                .domain([30, 90]).nice(1)
                .range([height - marginBottom, marginTop]);

            const area = d3.area()
                .curve(d3.curveStep)
                .x(d => x(d[0]))
                .y0(d => y(d[1]))
                .y1(d => y(d[2]));

            // Create the SVG container.
            const svg = d3.create("svg")
                .attr("width", width)
                .attr("height", height)
                .attr("viewBox", [0, 0, width, height])
                .attr("style", "max-width: 100%; height: auto; height: intrinsic;");

            // Add the area path.
            svg.append("path")
                .datum(data)
                .attr("fill", "steelblue")
                .attr("d", area);

            // Add the horizontal axis.
            svg.append("g")
                .attr("transform", `translate(0,${height - marginBottom})`)
                .call(d3.axisBottom(x).ticks(width / 80).tickSizeOuter(0))
                .call(g => g.select(".domain").remove())
                .call(g => g.append("text")
                    .attr("x", width)
                    .attr("y", 30)
                    .attr("fill", "currentColor")
                    .attr("text-anchor", "end")
                    .text("Hood Angle (deg)"));

            // Add the vertical axis, a grid and an axis label.
            svg.append("g")
                .attr("transform", `translate(${marginLeft},0)`)
                .call(d3.axisLeft(y))
                .call(g => g.select(".domain").remove())
                .call(g => g.selectAll(".tick line").clone()
                    .attr("x2", width - marginLeft - marginRight)
                    .attr("stroke-opacity", 0.1))
                .call(g => g.append("text")
                    .attr("x", -marginLeft)
                    .attr("y", 10)
                    .attr("fill", "currentColor")
                    .attr("text-anchor", "start")
                    .text("Flywheel Speed (rps)"));

            svg.on("click", function (ev) {
                let raw = d3.pointer(ev, svg.node);
                let posX = x.invert(raw[0]);
                let posY = y.invert(raw[1]) + 3;
                console.log([posX, posY]);
            });

            let node = svg.node();
            node.id = "test";

            document.body.appendChild(node);
        }

        band_graph(data);
    </script>
</body>

</html>
