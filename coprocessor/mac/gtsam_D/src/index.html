<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Upload</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: #111111;

            font-family: Arial, sans-serif;
            color: #f3f3f3;
        }

        .card {
            width: 420px;

            padding: 32px;

            background: #1b1b1b;

            border: 1px solid #3a3a3a;
            border-radius: 14px;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;

            text-align: center;

            color: #d65c5c;

            font-size: 28px;
            font-weight: 600;
        }

        input[type="file"] {
            width: 100%;

            padding: 12px;

            box-sizing: border-box;

            background: #262626;

            color: #f3f3f3;

            border: 1px solid #444;
            border-radius: 8px;
        }

        button {
            width: 100%;

            margin-top: 20px;
            padding: 14px;

            border: none;
            border-radius: 8px;

            background: #a94444;

            color: white;

            font-size: 16px;
            font-weight: 600;

            cursor: pointer;

            transition: background 0.15s ease;
        }

        button:hover {
            background: #933c3c;
        }

        #status {
            margin-top: 18px;

            text-align: center;

            color: #cfcfcf;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Upload JSON</h1>

        <input type="file" id="fileInput" accept=".json">

        <button onclick="uploadFile()">
            Upload
        </button>

        <div id="status"></div>

    </div>

    <script>
        async function uploadFile() {
            const file =
                document
                    .getElementById("fileInput")
                    .files[0];

            if (!file) {
                document
                    .getElementById("status")
                    .innerText = "Select a file first.";

                return;
            }

            const text = await file.text();

            const response = await fetch("/upload",
                {
                    method: "POST",

                    headers:
                    {
                        "Content-Type": "application/json"
                    },

                    body: text
                });

            const result = await response.text();

            document
                .getElementById("status")
                .innerText = result;
        }
    </script>

</body>

</html>
