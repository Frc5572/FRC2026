<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Robot Dashboard</title>

    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <style>
        body {
            background: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .card {
            background: #2a2a2a;
            padding: 16px;
            margin-top: 12px;
            border-radius: 10px;
        }

        button {
            padding: 10px 16px;
            margin-right: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .start {
            background: #3c7;
        }

        .stop {
            background: #c44;
            color: white;
        }
    </style>
</head>

<body>

    <h1>Robot Tracking Dashboard</h1>

    <div id="status">
        <div class="card">
            Status: {{ state.status }}
        </div>
    </div>

    <button class="start" hx-post="/start" hx-target="#status" hx-swap="innerHTML">
        Start Tracking
    </button>

    <button class="stop" hx-post="/stop" hx-target="#status" hx-swap="innerHTML">
        Stop Tracking
    </button>

    <div id="telemetry" hx-get="/telemetry" hx-trigger="load, every 1s" hx-swap="innerHTML">
    </div>

</body>

</html>
